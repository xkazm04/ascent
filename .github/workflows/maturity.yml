# Example: gate this repo on its own AI-native maturity using the Ascent action.
#
# Manual by default (workflow_dispatch) so it never blocks PRs until you've pointed it at a
# deployment. To make it a real merge gate, (1) set the repo/org variable ASCENT_URL to your
# Ascent deployment, and (2) add `pull_request:` to the triggers below.
name: Maturity gate
on:
  workflow_dispatch:
  # pull_request:        # ← uncomment to gate every PR

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ascent maturity gate
        uses: ./ # in a consumer repo this is: <owner>/ascent@v1
        with:
          ascent-url: ${{ vars.ASCENT_URL }}
          # On a pull_request run this scores the PR head (what the PR changes); empty elsewhere
          # → the default branch. github.event.pull_request.head.sha is unset for non-PR events.
          ref: ${{ github.event.pull_request.head.sha }}
          min-level: L3
          no-ungoverned: "true"

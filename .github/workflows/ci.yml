# Ascent CI — Ascent dogfooding its own rigor (D2/D3): lint, typecheck, unit tests, and build on
# every PR and on pushes to the default branch.
name: CI
on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx vitest run
      - name: Build
        run: npm run build
